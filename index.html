<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>GK5</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="shortcut icon" href="assets/images/GK5.png" type="image/x-icon">
</head>
<body>

  <div class="player-wrap" id="playerWrap">
    <div class="player-glow" id="playerGlow"></div>
    <img class="player-img" id="playerImg" src="assets/images/closed.png" alt="" draggable="false" />
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="cd-wrap" id="cdWrap">
    <img class="cd-img" id="cdImg" src="assets/images/cd.png" alt="" draggable="false" />
  </div>
  <br><br>

  <div class="footer">
    <p class="tagline">GK5 COMING SUMMER 2026</p>
    <img class="signature" src="assets/images/signiture.png" alt="" draggable="false" />
  </div>

  <script src="js/utils.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/drag.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
